<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Sensor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1rem;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .sensor-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .sensor-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .sensor-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .sensor-card.temp .sensor-icon {
      background: linear-gradient(135deg, #f97316, #ef4444);
    }

    .sensor-card.humidity .sensor-icon {
      background: linear-gradient(135deg, #06b6d4, #0ea5e9);
    }

    .sensor-card.distance .sensor-icon {
      background: linear-gradient(135deg, #8b5cf6, #a855f7);
    }

    .sensor-label {
      color: #94a3b8;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .sensor-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .sensor-unit {
      font-size: 1rem;
      font-weight: 400;
      color: #94a3b8;
      margin-left: 0.25rem;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
      gap: 1.5rem;
    }

    .chart-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      width: 100%;
      overflow: hidden;
    }

    .chart-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f8fafc;
    }

    .chart-container {
      position: relative;
      height: 250px;
      width: 100%;
    }

    .last-update {
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      margin-top: 2rem;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      h1 {
        font-size: 1.75rem;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    .pause-btn {
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .pause-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .pause-btn.active {
      background: #ef4444;
      border-color: #ef4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
    }

    .reset-btn {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f8fafc;
      margin-left: 0.5rem;
    }

    .reset-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Container Settings Styles */
    .dashboard-settings {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }

    .settings-title {
      font-size: 1rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .setting-item label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
    }

    .setting-item input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 0.6rem;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .setting-item input:focus {
      border-color: #06b6d4;
    }

    /* New Specific Cards */
    .sensor-card.level .sensor-icon {
      background: linear-gradient(135deg, #10b981, #34d399);
    }

    .sensor-card.volume .sensor-icon {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
    }

    .progress-mini {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .progress-mini-bar {
      height: 100%;
      width: 0%;
      background: #10b981;
      transition: width 1s ease;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>IoT Sensor Dashboard</h1>
      <p class="subtitle">DHT22 Temperature & Humidity | Ultrasonic Distance</p>
      <button id="pauseBtn" class="pause-btn">Pause Updates</button>
      <button id="resetBtn" class="pause-btn reset-btn">Reset Data</button>
    </header>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connected</span>
    </div>

    <div class="dashboard-settings">
      <div class="settings-title"><span>⚙️</span> Container Configuration</div>
      <div class="settings-grid">
        <div class="setting-item">
          <label for="boxL">Length (m)</label>
          <input type="number" id="boxL" value="0.2" step="0.01">
        </div>
        <div class="setting-item">
          <label for="boxB">Breadth (m)</label>
          <input type="number" id="boxB" value="0.2" step="0.01">
        </div>
        <div class="setting-item">
          <label for="boxH">Box Height (m)</label>
          <input type="number" id="boxH" value="0.5" step="0.01">
        </div>
      </div>
    </div>

    <div class="cards-grid">
      <div class="sensor-card temp">
        <div class="sensor-icon">🌡️</div>
        <div class="sensor-label">Temperature</div>
        <div class="sensor-value"><span id="tempValue">--</span><span class="sensor-unit">°C</span></div>
      </div>

      <div class="sensor-card humidity">
        <div class="sensor-icon">💧</div>
        <div class="sensor-label">Humidity</div>
        <div class="sensor-value"><span id="humidityValue">--</span><span class="sensor-unit">%</span></div>
      </div>

      <div class="sensor-card distance">
        <div class="sensor-icon">📏</div>
        <div class="sensor-label">Distance</div>
        <div class="sensor-value"><span id="distanceValue">--</span><span class="sensor-unit">m</span></div>
      </div>

      <div class="sensor-card level">
        <div class="sensor-icon">📊</div>
        <div class="sensor-label">Fill Level</div>
        <div class="sensor-value"><span id="levelValue">--</span><span class="sensor-unit">%</span></div>
        <div class="progress-mini">
          <div class="progress-mini-bar" id="levelProgress"></div>
        </div>
      </div>

      <div class="sensor-card volume">
        <div class="sensor-icon">🛢️</div>
        <div class="sensor-label">Volume</div>
        <div class="sensor-value"><span id="volumeValue">--</span><span class="sensor-unit">m³</span></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Temperature & Humidity</div>
        <div class="chart-container">
          <canvas id="tempChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Distance</div>
        <div class="chart-container">
          <canvas id="distanceChart"></canvas>
        </div>
      </div>
    </div>

    <div class="last-update">
      Last updated: <span id="lastUpdate">--</span>
    </div>
  </div>

  <script>
    let isPaused = false;
    const pauseBtn = document.getElementById('pauseBtn');

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      if (isPaused) {
        pauseBtn.textContent = 'Resume Updates';
        pauseBtn.classList.add('active');
        document.getElementById('statusText').textContent = 'Paused';
        document.getElementById('statusDot').style.background = '#f59e0b';
      } else {
        pauseBtn.textContent = 'Pause Updates';
        pauseBtn.classList.remove('active');
        document.getElementById('statusText').textContent = 'Connected';
        document.getElementById('statusDot').style.background = '#22c55e';
        updateDashboard();
        updateCharts();
      }
    });

    const resetBtn = document.getElementById('resetBtn');
    resetBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to completely reset the dashboard and clear all charts?')) {
        fetch('/api/reset', { method: 'POST' })
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              // Reset manual inputs to 0
              document.getElementById('boxL').value = 0;
              document.getElementById('boxB').value = 0;
              document.getElementById('boxH').value = 0;
              localStorage.setItem('boxL', 0);
              localStorage.setItem('boxB', 0);
              localStorage.setItem('boxH', 0);

              // Ensure old data is cleared visually by forcing a refresh
              updateDashboard();
              updateCharts();
            }
          })
          .catch(err => console.error('Error resetting data:', err));
      }
    });

    const tempChartCtx = document.getElementById('tempChart').getContext('2d');
    const distanceChartCtx = document.getElementById('distanceChart').getContext('2d');

    const tempChart = new Chart(tempChartCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Temperature (°C)',
            borderColor: '#f97316',
            backgroundColor: 'rgba(249, 115, 22, 0.1)',
            fill: true,
            tension: 0.4,
            data: []
          },
          {
            label: 'Humidity (%)',
            borderColor: '#06b6d4',
            backgroundColor: 'rgba(6, 182, 212, 0.1)',
            fill: true,
            tension: 0.4,
            data: []
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#94a3b8' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#64748b' },
            grid: { color: 'rgba(100, 116, 139, 0.1)' }
          },
          y: {
            ticks: { color: '#64748b' },
            grid: { color: 'rgba(100, 116, 139, 0.1)' }
          }
        }
      }
    });

    const distanceChart = new Chart(distanceChartCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Distance (cm)',
          borderColor: '#8b5cf6',
          backgroundColor: 'rgba(139, 92, 246, 0.1)',
          fill: true,
          tension: 0.4,
          data: []
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#94a3b8' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#64748b' },
            grid: { color: 'rgba(100, 116, 139, 0.1)' }
          },
          y: {
            ticks: { color: '#64748b' },
            grid: { color: 'rgba(100, 116, 139, 0.1)' }
          }
        }
      }
    });

    const boxL = document.getElementById('boxL');
    const boxB = document.getElementById('boxB');
    const boxH = document.getElementById('boxH');

    // Load saved settings
    const savedL = localStorage.getItem('boxL');
    const savedB = localStorage.getItem('boxB');
    const savedH = localStorage.getItem('boxH');
    if (savedL) boxL.value = savedL;
    if (savedB) boxB.value = savedB;
    if (savedH) boxH.value = savedH;

    // Save on change
    [boxL, boxB, boxH].forEach(input => {
      input.addEventListener('change', () => {
        localStorage.setItem(input.id, input.value);
        updateDashboard();
      });
    });

    function updateDashboard() {
      if (isPaused) return;
      fetch('/api/sensor')
        .then(res => res.json())
        .then(data => {
          const statusDot = document.getElementById('statusDot');
          const statusText = document.getElementById('statusText');

          if (data.temperature === null) {
            statusDot.classList.add('disconnected');
            statusText.textContent = 'No data received';
            return;
          }

          statusDot.classList.remove('disconnected');
          statusText.textContent = 'Connected';

          const rawDist = data.distance;
          const distM = rawDist !== null ? rawDist / 100 : null; // Convert cm from sensor to m

          document.getElementById('tempValue').textContent = data.temperature?.toFixed(1) || '--';
          document.getElementById('humidityValue').textContent = data.humidity?.toFixed(1) || '--';
          document.getElementById('distanceValue').textContent = distM?.toFixed(2) || '--';
          document.getElementById('lastUpdate').textContent = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : '--';

          if (distM !== null) {
            const L = parseFloat(boxL.value) || 0;
            const B = parseFloat(boxB.value) || 0;
            const H = parseFloat(boxH.value) || 0;  // All are now in meters
            
            const materialHeight = Math.max(0, H - distM);
            let percentage = (H > 0) ? (materialHeight / H) * 100 : 0;
            percentage = Math.min(100, Math.max(0, percentage));
            
            const volM3 = L * B * materialHeight;

            document.getElementById('levelValue').textContent = percentage.toFixed(1);
            document.getElementById('levelProgress').style.width = percentage + '%';
            document.getElementById('volumeValue').textContent = volM3.toFixed(4);

            // Color indicator for progress
            const bar = document.getElementById('levelProgress');
            if (percentage >= 80) bar.style.background = '#10b981';
            else if (percentage >= 40) bar.style.background = '#f59e0b';
            else bar.style.background = '#f43f5e';
          }
        })
        .catch(err => {
          console.error('Error:', err);
        });
    }

    function updateCharts() {
      if (isPaused) return;
      fetch('/api/history')
        .then(res => res.json())
        .then(history => {
          const labels = history.map((_, i) => i + 1);
          const temps = history.map(h => h.temperature);
          const humids = history.map(h => h.humidity);
          const distances = history.map(h => h.distance);

          tempChart.data.labels = labels;
          tempChart.data.datasets[0].data = temps;
          tempChart.data.datasets[1].data = humids;
          tempChart.update();

          distanceChart.data.labels = labels;
          distanceChart.data.datasets[0].data = distances;
          distanceChart.update();
        })
        .catch(err => {
          console.error('Error:', err);
        });
    }

    updateDashboard();
    updateCharts();

    setInterval(updateDashboard, 2000);
    setInterval(updateCharts, 5000);
  </script>
</body>

</html>
