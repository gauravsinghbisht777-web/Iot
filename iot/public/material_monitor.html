<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Level Monitor | IoT Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Status Colors */
            --color-full: #10b981;
            --color-half: #f59e0b;
            --color-low: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar / Inputs */
        .controls {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .controls h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
        }

        .btn-sync {
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-sync:active {
            transform: translateY(0);
        }

        /* Main Display Area */
        .display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.full-width {
            grid-column: span 2;
            padding: 3rem;
            align-items: center;
            text-align: center;
        }

        .card-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .card-unit {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        /* Progress Visual */
        .progress-container {
            width: 100%;
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--accent-secondary), var(--color-full));
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .status-badge {
            margin-top: 1.5rem;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.5s ease;
        }

        .status-full { background: rgba(16, 185, 129, 0.1); color: var(--color-full); border: 1px solid var(--color-full); }
        .status-half { background: rgba(245, 158, 11, 0.1); color: var(--color-half); border: 1px solid var(--color-half); }
        .status-low { background: rgba(244, 63, 94, 0.1); color: var(--color-low); border: 1px solid var(--color-low); }

        .dimensions-label {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .display {
                grid-template-columns: 1fr;
            }
            .card.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- Input Sidebar -->
        <aside class="controls">
            <h2>Configuration</h2>
            <div class="input-group">
                <label for="length">Length (L) in cm</label>
                <input type="number" id="length" value="20" step="0.1">
            </div>
            <div class="input-group">
                <label for="breadth">Breadth (B) in cm</label>
                <input type="number" id="breadth" value="20" step="0.1">
            </div>
            <div class="input-group">
                <label for="height">Box Height (H) in cm</label>
                <input type="number" id="height" value="50" step="0.1">
            </div>
            <div class="input-group">
                <label for="sensor">Sensor Reading (D) in cm</label>
                <input type="number" id="sensor" value="10" step="0.1">
            </div>
            
            <button class="btn-sync" id="syncBtn">
                <span>🔄</span> Sync Live Sensor
            </button>
        </aside>

        <!-- Display Cards -->
        <main class="display">
            <!-- Fill Level Card -->
            <div class="card full-width">
                <div class="dimensions-label" id="dimSummary">Box: 20 x 20 x 50 cm</div>
                <div class="card-label">Overall Fill Level</div>
                <div class="card-value"><span id="fillPercent">0</span><span class="card-unit">%</span></div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <div id="statusBadge" class="status-badge status-full">FULL</div>
            </div>

            <!-- Volume cm3 Card -->
            <div class="card">
                <div class="card-label">Volume (cm³)</div>
                <div class="card-value" id="volCm3">0</div>
                <div style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">Cubic Centimeters</div>
            </div>

            <!-- Volume Liters Card -->
            <div class="card">
                <div class="card-label">Volume (Liters)</div>
                <div class="card-value"><span id="volL">0</span><span class="card-unit">L</span></div>
                <div style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">Total Liquid/Bulk</div>
            </div>
        </main>
    </div>

    <script>
        const inputs = ['length', 'breadth', 'height', 'sensor'].map(id => document.getElementById(id));
        const [lenIn, brdIn, hgtIn, snsIn] = inputs;
        
        const fillTxt = document.getElementById('fillPercent');
        const bar = document.getElementById('progressBar');
        const volC = document.getElementById('volCm3');
        const volL = document.getElementById('volL');
        const status = document.getElementById('statusBadge');
        const dimSum = document.getElementById('dimSummary');
        const syncBtn = document.getElementById('syncBtn');

        function calculate() {
            const L = parseFloat(lenIn.value) || 0;
            const B = parseFloat(brdIn.value) || 0;
            const H = parseFloat(hgtIn.value) || 0;
            const D = parseFloat(snsIn.value) || 0;

            // Calculations
            let materialHeight = Math.max(0, H - D);
            let percentage = (H > 0) ? (materialHeight / H) * 100 : 0;
            percentage = Math.min(100, Math.max(0, percentage));
            
            const vCm3 = L * B * materialHeight;
            const vL = vCm3 / 1000;

            // UI Updates
            fillTxt.innerText = percentage.toFixed(1);
            bar.style.width = percentage + '%';
            volC.innerText = vCm3.toLocaleString(undefined, {maximumFractionDigits: 0});
            volL.innerText = vL.toFixed(2);
            dimSum.innerText = `Box: ${L} x ${B} x ${H} cm`;

            // Status & Color Logic
            status.className = 'status-badge';
            if (percentage >= 80) {
                status.innerText = 'FULL';
                status.classList.add('status-full');
                bar.style.background = 'linear-gradient(90deg, var(--accent-secondary), var(--color-full))';
                bar.style.boxShadow = '0 0 20px rgba(16, 185, 129, 0.4)';
            } else if (percentage >= 40) {
                status.innerText = 'HALF';
                status.classList.add('status-half');
                bar.style.background = 'linear-gradient(90deg, var(--accent-secondary), var(--color-half))';
                bar.style.boxShadow = '0 0 20px rgba(245, 158, 11, 0.4)';
            } else {
                status.innerText = 'LOW';
                status.classList.add('status-low');
                bar.style.background = 'linear-gradient(90deg, var(--accent-secondary), var(--color-low))';
                bar.style.boxShadow = '0 0 20px rgba(244, 63, 94, 0.4)';
            }
        }

        // Live update on input
        inputs.forEach(el => el.addEventListener('input', calculate));

        // Initial calc
        calculate();

        // Sync Feature
        syncBtn.addEventListener('click', async () => {
            syncBtn.innerText = '⌛ Connecting...';
            try {
                const response = await fetch('/api/sensor');
                const data = await response.json();
                if (data.distance !== null) {
                    snsIn.value = data.distance.toFixed(1);
                    calculate();
                    syncBtn.innerText = '✅ Synced';
                    setTimeout(() => syncBtn.innerHTML = '<span>🔄</span> Sync Live Sensor', 2000);
                } else {
                    throw new Error('No sensor data');
                }
            } catch (err) {
                syncBtn.innerText = '❌ Error';
                setTimeout(() => syncBtn.innerHTML = '<span>🔄</span> Sync Live Sensor', 2000);
            }
        });
    </script>
</body>
</html>
